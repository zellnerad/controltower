<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Open Alerts panel — 3 options</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f6f6f4;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #17171a; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="open-alerts-options.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { OptionA, OptionB, OptionC } = window;

  const PANEL_W = 360;
  const PANEL_H = 640;

  function App() {
    return (
      <DesignCanvas
        title="Open Alerts in Billie Boss panel"
        subtitle="3 options for surfacing fleet alerts inline">
        <DCSection id="opts" title="Options">
          <DCArtboard id="a" label="A · Compact list" width={PANEL_W} height={PANEL_H}>
            <OptionA />
          </DCArtboard>
          <DCArtboard id="b" label="B · Stacked cards" width={PANEL_W} height={PANEL_H}>
            <OptionB />
          </DCArtboard>
          <DCArtboard id="c" label="C · Triage queue" width={PANEL_W} height={PANEL_H}>
            <OptionC />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

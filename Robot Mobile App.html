<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Robo-ops · Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { height: 100%; margin: 0; }
  body { font-family: 'Geist', var(--sans); background: #f6f6f4;
    font-feature-settings: 'ss01','cv11','ss03'; letter-spacing: -.005em; color: var(--ink); }
  .mono { font-family: 'Geist Mono', var(--mono); font-feature-settings: 'zero','ss01'; }
  @keyframes mobPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* Tweak panel (same vocabulary as desktop) */
  .tweak-panel { position: fixed; bottom: 16px; right: 16px; z-index: 200;
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.04);
    padding: 14px 16px; width: 250px; font-family: var(--sans); display: none; }
  .tweak-panel.on { display: block; }
  .tweak-panel h4 { margin: 0 0 10px; font-size: 12px; font-weight: 600;
    color: var(--ink-2); letter-spacing: .3px; text-transform: uppercase; }
  .tweak-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .tweak-row label { font-size: 11px; color: var(--ink-3); font-weight: 500; }
  .segs { display: flex; background: var(--surface-2); border-radius: 6px; padding: 2px; }
  .segs button { flex: 1; padding: 6px 8px; border: none; background: transparent;
    border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--ink-3);
    cursor: pointer; font-family: inherit; text-transform: capitalize; }
  .segs button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.TWEAKS = /*EDITMODE-BEGIN*/{
    "layoutVariant": "feed"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile-shared.jsx"></script>
<script type="text/babel" src="mobile-v1.jsx"></script>
<script type="text/babel" src="mobile-v2.jsx"></script>
<script type="text/babel" src="mobile-v3.jsx"></script>

<script type="text/babel">
  function DeviceCard({ dark, children }) {
    // Wrap a layout in an iOS status bar so the mock feels real. iOS frame
    // provides status bar + home indicator; each layout paints its own body.
    return (
      <div style={{ position: 'relative', width: 402, height: 874,
        borderRadius: 48, overflow: 'hidden',
        background: dark ? '#000' : '#F2F2F7',
        boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
        fontFamily: '-apple-system, system-ui, sans-serif' }}>
        {/* dynamic island */}
        <div style={{ position: 'absolute', top: 11, left: '50%',
          transform: 'translateX(-50%)', width: 126, height: 37,
          borderRadius: 24, background: '#000', zIndex: 50 }}/>
        {/* status bar */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 45 }}>
          <IOSStatusBar dark={dark}/>
        </div>
        {/* content */}
        <div style={{ position: 'absolute', inset: 0, fontFamily: 'Geist, var(--sans)' }}>
          {children}
        </div>
        {/* home indicator */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0,
          zIndex: 60, height: 34, display: 'flex', justifyContent: 'center',
          alignItems: 'flex-end', paddingBottom: 8, pointerEvents: 'none' }}>
          <div style={{ width: 139, height: 5, borderRadius: 100,
            background: dark ? 'rgba(255,255,255,.7)' : 'rgba(0,0,0,.25)' }}/>
        </div>
      </div>
    );
  }

  function App() {
    const [layoutVariant, setLayoutVariant] = React.useState(window.TWEAKS.layoutVariant || 'feed');
    const [tweaksOn, setTweaksOn] = React.useState(false);

    React.useEffect(() => {
      const onMsg = (e) => {
        if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
        if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
      };
      window.addEventListener('message', onMsg);
      window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      return () => window.removeEventListener('message', onMsg);
    }, []);

    const persist = (edits) => {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    };

    return (
      <>
        <DesignCanvas>
          <DCSection id="primary" title="Mobile robot-ops — 3 directions"
            subtitle="Monitor & intervene · approvals · queue · joystick when needed">
            <DCArtboard id="v1" label="V1 · Feed-first (conservative)" width={460} height={940}>
              <div style={{ padding: 29, background: '#efefec', height: '100%',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <DeviceCard dark={false}>
                  <MobileV1 layoutVariant={layoutVariant}/>
                </DeviceCard>
              </div>
            </DCArtboard>

            <DCArtboard id="v2" label="V2 · Dispatcher (balanced)" width={460} height={940}>
              <div style={{ padding: 29, background: '#efefec', height: '100%',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <DeviceCard dark={true}>
                  <MobileV2 layoutVariant={layoutVariant}/>
                </DeviceCard>
              </div>
            </DCArtboard>

            <DCArtboard id="v3" label="V3 · Cockpit (bold)" width={460} height={940}>
              <div style={{ padding: 29, background: '#0b0d12', height: '100%',
                display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <DeviceCard dark={true}>
                  <MobileV3 layoutVariant={layoutVariant}/>
                </DeviceCard>
              </div>
            </DCArtboard>
          </DCSection>

          <DCPostIt x={60} y={-100} color="#fff59d">
            <div style={{ fontWeight: 600, marginBottom: 6 }}>Which section to port?</div>
            Live View — camera feed is the only thing that must be pixel-perfect
            on mobile. Map / arm / IK stay desktop-only. Queue + agent chat
            fit phone beautifully. E-stop + joystick live as intervention tools.
          </DCPostIt>

          <DCPostIt x={60} y={60} color="#c5e1a5">
            <div style={{ fontWeight: 600, marginBottom: 6 }}>Shared across all 3</div>
            • Feed with live chip + crosshair<br/>
            • Telemetry (mode/batt/net/cpu/ping)<br/>
            • Agent approval card (approve/deny)<br/>
            • Joystick (appears on demand)<br/>
            • E-stop always 1 tap away
          </DCPostIt>

          <DCPostIt x={60} y={220} color="#b3e5fc">
            <div style={{ fontWeight: 600, marginBottom: 6 }}>Tweak: layout variant</div>
            Each artboard reacts to the tweak panel — swap feed / map / agent
            as the top hero to compare information density.
          </DCPostIt>
        </DesignCanvas>

        <div className={'tweak-panel' + (tweaksOn ? ' on' : '')}>
          <h4>Tweaks</h4>
          <div className="tweak-row">
            <label>Hero panel</label>
            <div className="segs">
              {['feed', 'map', 'agent'].map(k => (
                <button key={k} className={layoutVariant === k ? 'on' : ''}
                  onClick={() => { setLayoutVariant(k); persist({ layoutVariant: k }); }}>
                  {k === 'feed' ? 'Feed' : k === 'map' ? 'Map' : 'Agent'}
                </button>
              ))}
            </div>
          </div>
          <div style={{ fontSize: 10.5, color: 'var(--ink-3)', lineHeight: 1.45,
            paddingTop: 6, borderTop: '1px solid var(--border)' }}>
            Applies to all 3 variants. V3's agent hero shows as the drawer default.
          </div>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
